<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三位情感专家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
        .dot-loading { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
        .dot-loading span { width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; animation: bounce 1.2s infinite ease-in-out; }
        .dot-loading span:nth-child(2) { animation-delay: 0.2s; }
        .dot-loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100% { transform:scale(0.7);opacity:0.5; } 40% { transform:scale(1);opacity:1; } }
        textarea { resize: none; }
        .view { display: none; flex-direction: column; }
        .view.active { display: flex; }
        .chevron { transition: transform 0.2s; }
        .chevron.open { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-gray-100 flex flex-col max-w-lg mx-auto overflow-hidden" style="height:100dvh">

    <!-- Header -->
    <div class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between flex-shrink-0">

        <div class="flex items-center gap-1">

                </svg>

<script>
// ─── Expert Config ───────────────────────────────────────────────────────────

const EXPERTS = {

首要原则：紧扣用户描述的具体情境，不泛泛讲框架。

首要原则：只分析用户实际描述的行为和互动，不套通用框架。

你的视角：把情绪翻译成可观察的行为，识别真实互动模式，冲突的方式比冲突本身更重要。

第3轮（用户表示想深入）：
  - 给出完整根因分析报告：行为模式根源、具体改进建议、长期改进方向
  - 400字以内

【优先识别——随时生效，高于轮次规则】
当用户表示问题已解决或想结束话题（说了「好的」「谢谢」「解决了」「没事了」「算了」「好多了」「我去试试」「行了」「不用了」「明白了」「知道了」等）：
  - 用一句话简短回应，绝不再给新的执行步骤
  - 50字以内，不问复盘（由策略主编来问）

第4轮起：正常对话跟进

给具体可执行的建议，不给「多沟通」这类模糊建议`
    },
    chen: {
        systemPrompt: `你是陈海贤，心理咨询师。

首要原则：先真正理解用户的具体处境，再回应。

你的视角：共情先于分析，很多个人困境是关系系统的困境，行动可以创造感觉。

【对话流程——严格按轮次执行】
第1轮（用户第一次说情况）：

【优先识别——随时生效，高于轮次规则】
当用户表示问题已解决或想结束话题（说了「好的」「谢谢」「解决了」「没事了」「算了」「好多了」「我去试试」「行了」「不用了」「明白了」「知道了」等）：
  - 用一句话简短回应，绝不再给新的执行步骤

温和，不鸡汤，不用「其实很简单」`
    }
};

const SYNTHESIZER = {
    systemPrompt: `你是一位资深关系策略师，负责整合三位专家的洞察，给出可立刻执行的方案。

【优先识别——随时生效，高于轮次规则】
当用户表示问题已解决或想结束话题（说了「好的」「谢谢」「解决了」「没事了」「算了」「好多了」「我去试试」「行了」「不用了」「明白了」「知道了」等）：
  - 不再给行动步骤
  - 问用户：「很好，问题解决了。需要的话，我可以帮你复盘这次事件——分析根源、总结规律、给出下次的改进方向，感兴趣吗？」
  - 如果用户说不需要，简短道别即可

【对话流程——严格按轮次执行】
第1轮：不出现（专家正在了解情况）

第2轮（专家已给出分析和建议后）：
  - 给出2-3个今天可以立刻执行的具体步骤
  - 每步附上可以直接说出口的话术，用「」括起来，口语化，像真人说话
  - 不重复专家分析，直接给方案
  - 第一步要最简单，350字以内

第3轮（用户要深入分析后）：
  - 给出结构化改进路线图：短期行动（本周）、中期调整（1-3个月）、长期方向
  - 每项附具体话术或行动描述
  - 400字以内

第4轮起：根据对话内容给出最新的行动建议`
};

const CARD_CFG = {
    perel:   { icon:'🌹', name:'叙事派',  sub:'关系叙事 · 欲望与权力',         bg:'rose-50',  nc:'rose-800',  sc:'rose-400',  cc:'rose-300',  collapsible:true  },
    gottman: { icon:'📊', name:'科学派',  sub:'行为科学 · 关系健康信号',        bg:'blue-50',  nc:'blue-800',  sc:'blue-400',  cc:'blue-300',  collapsible:true  },
    chen:    { icon:'🌿', name:'成长派',  sub:'自我发展 · 关系机制',            bg:'green-50', nc:'green-800', sc:'green-400', cc:'green-300', collapsible:true  },
    synth:   { icon:'✍️', name:'策略主编', sub:'整合三位专家 · 可执行方案与话术', bg:'amber-50', nc:'amber-800', sc:'amber-400', cc:null,        collapsible:false }
};

const MAX_UNPINNED = 20;

// ─── State ───────────────────────────────────────────────────────────────────

let currentConv = null; // { id, pinned, exchanges: [{user, experts:{perel,gottman,chen,synth}}], title, time }
let isLoading = false;

// ─── Init ────────────────────────────────────────────────────────────────────

function init() {
    loadSettingsToForm();
    checkApiKey();
    startNewConversation();
}

// ─── Conversation ─────────────────────────────────────────────────────────────

function startNewConversation() {
    currentConv = { id: Date.now(), pinned: false, exchanges: [], title: '', time: '' };
    document.getElementById('welcome-state').classList.remove('hidden');
    const ec = document.getElementById('exchanges-container');
    ec.classList.add('hidden');
    ec.innerHTML = '';
    const inp = document.getElementById('question-input');
    inp.value = '';
    inp.style.height = 'auto';
    switchView('main');
}

function openConversation(id) {
    const conv = getConvById(id);
    if (!conv) return;
    currentConv = JSON.parse(JSON.stringify(conv));
    document.getElementById('welcome-state').classList.add('hidden');
    const ec = document.getElementById('exchanges-container');
    ec.innerHTML = '';
    ec.classList.remove('hidden');
    conv.exchanges.forEach((ex, i) => renderExchange(ex, i, false));
    switchView('main');
    setTimeout(() => {
        const sa = document.getElementById('scroll-area');
        sa.scrollTop = sa.scrollHeight;
    }, 50);
}

// ─── Storage ──────────────────────────────────────────────────────────────────

function getAllConvs() {
    return JSON.parse(localStorage.getItem('expertConvs') || '[]');
}

function saveAllConvs(convs) {
    localStorage.setItem('expertConvs', JSON.stringify(convs));
}

function getConvById(id) {
    return getAllConvs().find(c => c.id === id) || null;
}

function saveCurrentConv() {
    if (!currentConv || currentConv.exchanges.length === 0) return;
    let all = getAllConvs();
    const idx = all.findIndex(c => c.id === currentConv.id);
    if (idx >= 0) all[idx] = currentConv;
    else all.unshift(currentConv);
    const pinned = all.filter(c => c.pinned);
    const unpinned = all.filter(c => !c.pinned).slice(0, MAX_UNPINNED);
    saveAllConvs([...pinned, ...unpinned]);
}

function togglePin(id) {
    const all = getAllConvs();
    const conv = all.find(c => c.id === id);
    if (!conv) return;
    conv.pinned = !conv.pinned;
    if (currentConv && currentConv.id === id) currentConv.pinned = conv.pinned;
    saveAllConvs(all);
    renderHistory();
}

function deleteConv(id) {
    saveAllConvs(getAllConvs().filter(c => c.id !== id));
    if (currentConv && currentConv.id === id) startNewConversation();
    renderHistory();
}

// ─── UI: Exchange Rendering ───────────────────────────────────────────────────

function makeCard(xIdx, key, restored) {
    const c = CARD_CFG[key];
    const div = document.createElement('div');
    div.id = `card-${xIdx}-${key}`;
    div.className = 'bg-white rounded-2xl shadow-sm overflow-hidden' + (key === 'synth' ? ' border border-amber-100' : '');
    div.innerHTML = `
        <div class="bg-${c.bg} px-4 py-2.5 flex items-center gap-2.5${c.collapsible ? ' cursor-pointer' : ''}"
             ${c.collapsible ? `onclick="toggleCard('${xIdx}-${key}')"` : ''}>
            <span class="text-lg">${c.icon}</span>
            <div class="flex-1">
                <div class="text-sm font-medium text-${c.nc}">${c.name}</div>
                <div class="text-xs text-${c.sc}">${c.sub}</div>
            </div>
            <div id="load-${xIdx}-${key}" class="dot-loading" style="${restored ? 'display:none' : ''}">
                <span></span><span></span><span></span>
            </div>
            ${c.collapsible ? `<svg id="chev-${xIdx}-${key}" class="chevron w-4 h-4 text-${c.cc} ${restored ? '' : 'hidden'} flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>` : ''}
        </div>
        <div id="cont-${xIdx}-${key}" class="hidden px-4 py-3 text-sm text-gray-700 leading-relaxed whitespace-pre-wrap"></div>`;
    return div;
}

function fillCard(xIdx, key, text, expand) {
    const load = document.getElementById(`load-${xIdx}-${key}`);
    const cont = document.getElementById(`cont-${xIdx}-${key}`);
    const chev = document.getElementById(`chev-${xIdx}-${key}`);
    if (load) load.style.display = 'none';
    if (cont) {
        cont.textContent = text;
        if (expand) cont.classList.remove('hidden');
    }
    if (chev) chev.classList.remove('hidden');
}

function toggleCard(id) {
    const cont = document.getElementById(`cont-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    if (!cont || !cont.textContent) return;
    const opening = cont.classList.contains('hidden');
    cont.classList.toggle('hidden', !opening);
    if (chev) chev.classList.toggle('open', opening);
}

function renderExchange(ex, xIdx, isLive) {
    const ec = document.getElementById('exchanges-container');
    const isFirst = xIdx === 0;
    const hasSynth = !isFirst && ex.experts && ex.experts.synth;

    if (xIdx > 0) {
        const div = document.createElement('div');
        div.className = 'border-t border-gray-200 pt-1';
        ec.appendChild(div);
    }

    const block = document.createElement('div');
    block.id = `xblock-${xIdx}`;
    block.className = 'space-y-3';

    // User bubble
    const bubble = document.createElement('div');
    bubble.className = 'flex justify-end';
    bubble.innerHTML = `<div class="bg-gray-800 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm max-w-xs leading-relaxed">${esc(ex.user)}</div>`;
    block.appendChild(bubble);

    const restored = !isLive;
    ['perel', 'gottman', 'chen'].forEach(key => block.appendChild(makeCard(xIdx, key, restored)));

    const synthCard = makeCard(xIdx, 'synth', restored);
    block.appendChild(synthCard);

    ec.appendChild(block);

    // Fill content if restored
    if (restored && ex.experts) {
        ['perel', 'gottman', 'chen'].forEach(key => {
            if (ex.experts[key]) fillCard(xIdx, key, ex.experts[key], false);
        });
        const synthText = ex.experts.synth || (isFirst ? '专家正在了解你的情况，你补充后我将给出具体行动方案。' : '');
        if (synthText) fillCard(xIdx, 'synth', synthText, true);
    }

    // Scroll to bottom
    const sa = document.getElementById('scroll-area');
    if (isLive) {
        setTimeout(() => { sa.scrollTop = sa.scrollHeight; }, 80);
    } else {
        sa.scrollTop = sa.scrollHeight;
    }
}

// ─── Send ─────────────────────────────────────────────────────────────────────

async function sendQuestion() {
    if (isLoading) return;
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question) return;

    const s = getSettings();
    if (!s.apiKey) { toast('请先在设置中填入 API Key'); switchView('settings'); return; }

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    document.getElementById('welcome-state').classList.add('hidden');
    document.getElementById('exchanges-container').classList.remove('hidden');

    const xIdx = currentConv.exchanges.length;
    const isFirst = xIdx === 0;
    const sa = document.getElementById('scroll-area');

    try {
        renderExchange({ user: question, experts: {} }, xIdx, true);

        // First turn: show placeholder in synth card immediately (no API call)
        if (isFirst) {
            fillCard(xIdx, 'synth', '专家正在了解你的情况，你补充后我将给出具体行动方案。', true);
        }

        const responses = {};

        await Promise.all(['perel', 'gottman', 'chen'].map(async key => {
            try {
                responses[key] = await callExpert(key, question, currentConv, s);
            } catch (err) {
                responses[key] = `⚠️ 请求失败：${err.message}`;
            }
            fillCard(xIdx, key, responses[key], false);
            sa.scrollTop = sa.scrollHeight;
        }));

        if (!isFirst) {
            try {
                responses.synth = await callSynth(question, responses, currentConv, s);
            } catch (err) {
                responses.synth = `⚠️ 请求失败：${err.message}`;
            }
            fillCard(xIdx, 'synth', responses.synth, true);
            sa.scrollTop = sa.scrollHeight;
        }

        currentConv.exchanges.push({ user: question, experts: responses });
        if (currentConv.exchanges.length === 1) {
            currentConv.title = question.slice(0, 30);
            currentConv.time = new Date().toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        saveCurrentConv();
    } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
    }
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function callExpert(key, userMsg, conv, s) {
    const messages = [{ role: 'system', content: EXPERTS[key].systemPrompt }];
    conv.exchanges.forEach(ex => {
        messages.push({ role: 'user', content: ex.user });
        if (ex.experts[key]) messages.push({ role: 'assistant', content: ex.experts[key] });
    });
    messages.push({ role: 'user', content: userMsg });
    return callAPI(messages, s);
}

async function callSynth(userMsg, expertResps, conv, s) {
    const messages = [{ role: 'system', content: SYNTHESIZER.systemPrompt }];
    conv.exchanges.forEach((ex, i) => {
        if (i === 0) return;
        messages.push({ role: 'user', content: ex.user });
        if (ex.experts.synth) messages.push({ role: 'assistant', content: ex.experts.synth });
    });
    const ctx = `用户消息：${userMsg}\n\n三位专家回应：\n🌹 叙事派：${expertResps.perel}\n📊 科学派：${expertResps.gottman}\n🌿 成长派：${expertResps.chen}`;
    messages.push({ role: 'user', content: ctx });
    return callAPI(messages, s);
}

async function callAPI(messages, settings) {
    const baseUrl = settings.baseUrl.replace(/\/$/, '');
    const res = await fetch(`${baseUrl}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${settings.apiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: settings.model || 'deepseek-chat', messages, max_tokens: 1000, temperature: 0.8 })
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    return (await res.json()).choices[0].message.content.trim();
}

// ─── Settings ─────────────────────────────────────────────────────────────────

function loadSettingsToForm() {
    const s = getSettings();
    document.getElementById('api-key-input').value = s.apiKey || '';
    document.getElementById('base-url-input').value = s.baseUrl || 'https://api.deepseek.com';
    document.getElementById('model-input').value = s.model || 'deepseek-chat';
}

function getSettings() { return JSON.parse(localStorage.getItem('expertSettings') || '{}'); }

function checkApiKey() {
    document.getElementById('no-key-warning').classList.toggle('hidden', !!getSettings().apiKey);
}

function saveSettings() {
    const settings = {
        apiKey: document.getElementById('api-key-input').value.trim(),
        baseUrl: document.getElementById('base-url-input').value.trim() || 'https://api.deepseek.com',
        model: document.getElementById('model-input').value.trim() || 'deepseek-chat'
    };
    localStorage.setItem('expertSettings', JSON.stringify(settings));
    checkApiKey();
    toast('设置已保存');
    switchView('main');
}

// ─── History ──────────────────────────────────────────────────────────────────

function renderHistory() {
    const all = getAllConvs();
    const listEl = document.getElementById('history-list');
    const emptyEl = document.getElementById('history-empty');
    if (all.length === 0) { emptyEl.classList.remove('hidden'); listEl.innerHTML = ''; return; }
    emptyEl.classList.add('hidden');
    const sorted = [...all].sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return b.id - a.id;
    });
    listEl.innerHTML = sorted.map(c => `
        <div class="flex items-start gap-2 px-4 py-3${c.pinned ? ' bg-amber-50' : ''}">
            <button onclick="openConversation(${c.id})" class="flex-1 text-left min-w-0">
                <p class="text-sm text-gray-800 line-clamp-2 leading-snug">${esc(c.title || '')}</p>
                <p class="text-xs text-gray-400 mt-1">${c.time}${c.exchanges.length > 1 ? ` · ${c.exchanges.length}轮` : ''}</p>
            </button>
            <div class="flex items-center gap-0.5 flex-shrink-0 mt-0.5">
                <button onclick="togglePin(${c.id})" class="p-1.5 ${c.pinned ? 'text-amber-500' : 'text-gray-300'}" title="${c.pinned ? '取消置顶' : '置顶'}">
                    <svg class="w-4 h-4" fill="${c.pinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                    </svg>
                </button>
                <button onclick="if(confirm('删除这条对话？'))deleteConv(${c.id})" class="p-1.5 text-gray-300 active:text-red-400" title="删除">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    `).join('');
}

function clearHistory() {
    if (!confirm('确定清除所有历史记录吗？')) return;
    localStorage.removeItem('expertConvs');
    startNewConversation();
    renderHistory();
    toast('已清除');
}

// ─── View & Input ─────────────────────────────────────────────────────────────

function switchView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('[id^="nav-"]').forEach(n => { n.classList.remove('text-gray-800'); n.classList.add('text-gray-400'); });
    document.getElementById(`view-${view}`).classList.add('active');
    const btn = document.getElementById(`nav-${view}`);
    if (btn) { btn.classList.remove('text-gray-400'); btn.classList.add('text-gray-800'); }
    if (view === 'history') renderHistory();
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 112) + 'px'; }

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 640) { e.preventDefault(); sendQuestion(); }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function toast(msg) {
    const el = document.createElement('div');
    el.className = 'fixed top-14 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-4 py-2 rounded-full z-50 shadow-lg pointer-events-none';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
}

function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
